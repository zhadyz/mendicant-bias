<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahoraga Adaptation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050507;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  #scene {
    position: relative;
    width: 100vmin;
    height: 100vmin;
    max-width: 500px;
    max-height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas { position: absolute; width: 100%; height: 100%; z-index: 2; }

  #glowLayer {
    position: absolute;
    width: 85%;
    height: 85%;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    z-index: 1;
    filter: blur(35px);
  }

  #flashLayer {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, transparent 55%);
    opacity: 0;
    pointer-events: none;
    z-index: 3;
  }

  #prompt {
    position: fixed;
    bottom: 6%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: #444;
    letter-spacing: 3px;
    z-index: 10;
    animation: pulse 2.5s ease-in-out infinite;
  }

  #adaptText {
    position: fixed;
    font-family: 'VT323', monospace;
    font-size: 36px;
    color: #d4b8ff;
    letter-spacing: 10px;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    bottom: 6%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-shadow: 0 0 30px rgba(180,140,255,0.8), 0 0 60px rgba(140,100,220,0.4);
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }
</style>
</head>
<body>
<div id="scene">
  <div id="glowLayer"></div>
  <div id="flashLayer"></div>
  <canvas id="c"></canvas>
  <div id="prompt">tap to adapt</div>
  <div id="adaptText">ADAPTED</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const glowLayer = document.getElementById('glowLayer');
const flashLayer = document.getElementById('flashLayer');
const promptEl = document.getElementById('prompt');
const adaptText = document.getElementById('adaptText');

const dpr = window.devicePixelRatio || 1;
const container = document.getElementById('scene');
let sz;

function resize() {
  const rect = container.getBoundingClientRect();
  sz = Math.min(rect.width, rect.height);
  canvas.width = sz * dpr;
  canvas.height = sz * dpr;
  canvas.style.width = sz + 'px';
  canvas.style.height = sz + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

let currentAngle = 0;
let spinning = false;
let screenShake = { x: 0, y: 0 };

// Particles
let particles = [];
function spawnParticles(count, intensity) {
  const c = sz / 2;
  const r = sz * 0.38;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = r * (0.5 + Math.random() * 0.6);
    particles.push({
      x: c + dist * Math.cos(angle),
      y: c + dist * Math.sin(angle),
      vx: (Math.random() - 0.5) * intensity * 3.5,
      vy: (Math.random() - 0.5) * intensity * 3.5,
      life: 1,
      decay: 0.008 + Math.random() * 0.025,
      size: 1.5 + Math.random() * 3 * intensity,
      hue: 255 + Math.random() * 50,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 70%, 75%, ${p.life * 0.8})`;
    ctx.fill();
  }
}

// Draw a 3D-looking sphere with gradient shading
function drawSphere(x, y, radius, glowAmt) {
  const gB = glowAmt * 80;
  
  // Base color (golden/bronze like reference)
  const baseR = 160 + gB * 0.5;
  const baseG = 140 + gB * 0.3;
  const baseB = 90 + gB * 0.8;

  // Shadow underneath
  ctx.save();
  ctx.beginPath();
  ctx.arc(x + radius * 0.08, y + radius * 0.1, radius * 1.05, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(0,0,0,0.3)`;
  ctx.fill();
  ctx.restore();

  // Main sphere gradient
  const grad = ctx.createRadialGradient(
    x - radius * 0.3, y - radius * 0.35, radius * 0.05,
    x, y, radius
  );
  grad.addColorStop(0, `rgb(${Math.min(255, baseR + 80)},${Math.min(255, baseG + 70)},${Math.min(255, baseB + 50)})`);
  grad.addColorStop(0.4, `rgb(${baseR},${baseG},${baseB})`);
  grad.addColorStop(0.75, `rgb(${baseR * 0.65},${baseG * 0.6},${baseB * 0.55})`);
  grad.addColorStop(1, `rgb(${baseR * 0.35},${baseG * 0.3},${baseB * 0.25})`);

  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Highlight spot
  ctx.beginPath();
  ctx.arc(x - radius * 0.25, y - radius * 0.28, radius * 0.22, 0, Math.PI * 2);
  const hlGrad = ctx.createRadialGradient(
    x - radius * 0.25, y - radius * 0.28, 0,
    x - radius * 0.25, y - radius * 0.28, radius * 0.22
  );
  hlGrad.addColorStop(0, `rgba(255,255,240,0.7)`);
  hlGrad.addColorStop(1, `rgba(255,255,240,0)`);
  ctx.fillStyle = hlGrad;
  ctx.fill();

  // Glow aura when energized
  if (glowAmt > 0.1) {
    ctx.save();
    ctx.shadowColor = `rgba(180, 150, 255, ${glowAmt * 0.6})`;
    ctx.shadowBlur = radius * glowAmt * 1.5;
    ctx.beginPath();
    ctx.arc(x, y, radius * 0.95, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(180, 150, 255, ${glowAmt * 0.3})`;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }
}

function drawWheel(angle, glowAmt) {
  const s = sz;
  const c = s / 2;
  const outerR = s * 0.32;
  const spokeLen = s * 0.42; // spokes extend beyond rim to where balls sit
  const hubR = s * 0.065;
  const rimW = s * 0.022;
  const spokeW = s * 0.028;
  const ballR = s * 0.045; // large balls
  const centerBallR = s * 0.055; // even larger center ball

  const gB = Math.floor(glowAmt * 80);

  ctx.clearRect(0, 0, s, s);
  ctx.save();
  ctx.translate(c + screenShake.x, c + screenShake.y);
  ctx.rotate(angle);
  ctx.translate(-c, -c);

  // === OUTER GLOW AURA ===
  if (glowAmt > 0.05) {
    ctx.save();
    ctx.shadowColor = `rgba(170, 130, 255, ${glowAmt * 0.9})`;
    ctx.shadowBlur = 25 + glowAmt * 55;
    ctx.beginPath();
    ctx.arc(c, c, spokeLen + ballR, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(170, 130, 255, ${glowAmt * 0.2})`;
    ctx.lineWidth = rimW * 2;
    ctx.stroke();
    ctx.restore();
  }

  // === OUTER RIM ===
  ctx.beginPath();
  ctx.arc(c, c, outerR, 0, Math.PI * 2);
  const rimBase = 150 + gB;
  ctx.strokeStyle = `rgb(${rimBase},${rimBase - 15},${rimBase - 50})`;
  ctx.lineWidth = rimW;
  ctx.stroke();

  // === 8 THICK SPOKES ===
  for (let i = 0; i < 8; i++) {
    const a = (i * Math.PI) / 4 - Math.PI / 2;
    const cosA = Math.cos(a);
    const sinA = Math.sin(a);
    const perpX = -sinA;
    const perpY = cosA;
    const halfW = spokeW / 2;

    // Spoke from hub edge to ball center
    const x1 = c + hubR * cosA + perpX * halfW;
    const y1 = c + hubR * sinA + perpY * halfW;
    const x2 = c + hubR * cosA - perpX * halfW;
    const y2 = c + hubR * sinA - perpY * halfW;
    const x3 = c + spokeLen * cosA - perpX * halfW * 0.8;
    const y3 = c + spokeLen * sinA - perpY * halfW * 0.8;
    const x4 = c + spokeLen * cosA + perpX * halfW * 0.8;
    const y4 = c + spokeLen * sinA + perpY * halfW * 0.8;

    const spokeBase = 130 + gB * 0.7;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.lineTo(x3, y3);
    ctx.lineTo(x4, y4);
    ctx.closePath();
    ctx.fillStyle = `rgb(${spokeBase},${spokeBase - 12},${spokeBase - 45})`;
    ctx.fill();

    // Spoke edge highlight
    ctx.strokeStyle = `rgb(${spokeBase + 25},${spokeBase + 10},${spokeBase - 20})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // === BALLS at spoke tips ===
  for (let i = 0; i < 8; i++) {
    const a = (i * Math.PI) / 4 - Math.PI / 2;
    const bx = c + spokeLen * Math.cos(a);
    const by = c + spokeLen * Math.sin(a);
    drawSphere(bx, by, ballR, glowAmt);
  }

  // === CENTER BALL ===
  drawSphere(c, c, centerBallR, glowAmt);

  ctx.restore();
  drawParticles();
}

// === ANIMATION ===
function spinOnce() {
  if (spinning) return;
  spinning = true;
  promptEl.style.display = 'none';
  adaptText.style.opacity = '0';
  flashLayer.style.opacity = '0';
  flashLayer.style.transition = 'none';

  const startAngle = currentAngle;
  const turnAmount = (Math.PI * 2) / 8;
  const startTime = performance.now();

  const TENSION = 1300;
  const SNAP = 250;
  const IMPACT = 120;
  const SETTLE = 450;
  const COOL = 900;
  const TOTAL = TENSION + SNAP + IMPACT + SETTLE + COOL;

  function animate(now) {
    const elapsed = now - startTime;
    let angle = startAngle;
    let glowAmt = 0;

    if (elapsed < TENSION) {
      const tp = elapsed / TENSION;
      const freq = 6 + tp * 45;
      const amp = tp * tp * tp * 0.045;
      angle = startAngle + Math.sin(elapsed * freq * 0.01) * amp;
      glowAmt = tp * tp * tp * 0.85;

      const shake = tp * tp * 2.2;
      screenShake.x = (Math.random() - 0.5) * shake;
      screenShake.y = (Math.random() - 0.5) * shake;

      if (tp > 0.25 && Math.random() < tp * 0.5) spawnParticles(1, tp * 1.2);

      glowLayer.style.opacity = tp * tp * 0.55;
      glowLayer.style.background = `radial-gradient(circle, 
        hsla(270, 65%, 65%, ${tp * 0.45}) 0%, 
        hsla(280, 55%, 40%, ${tp * 0.18}) 50%, 
        transparent 70%)`;

    } else if (elapsed < TENSION + SNAP) {
      const sp = (elapsed - TENSION) / SNAP;
      const overshoot = 1.07;
      const eased = 1 - Math.pow(1 - sp, 5);
      const overEased = eased * overshoot - (overshoot - 1) * Math.pow(sp, 4);
      angle = startAngle + turnAmount * Math.min(overEased, 1.05);
      glowAmt = 1.0;

      const shake = (1 - sp) * 5;
      screenShake.x = (Math.random() - 0.5) * shake;
      screenShake.y = (Math.random() - 0.5) * shake;

      if (sp < 0.2) spawnParticles(6, 2.5);
      glowLayer.style.opacity = 0.65 + sp * 0.2;

    } else if (elapsed < TENSION + SNAP + IMPACT) {
      const ip = (elapsed - TENSION - SNAP) / IMPACT;
      angle = startAngle + turnAmount * (1 + 0.05 * (1 - ip));
      glowAmt = 1.0 - ip * 0.15;

      flashLayer.style.transition = 'none';
      flashLayer.style.opacity = (1 - ip) * 0.7;

      const shake = (1 - ip) * 3.5;
      screenShake.x = (Math.random() - 0.5) * shake;
      screenShake.y = (Math.random() - 0.5) * shake;
      spawnParticles(2, 1.8 * (1 - ip));

    } else if (elapsed < TENSION + SNAP + IMPACT + SETTLE) {
      const setp = (elapsed - TENSION - SNAP - IMPACT) / SETTLE;
      const bounce = Math.sin(setp * Math.PI * 2.5) * 0.006 * (1 - setp);
      angle = startAngle + turnAmount + bounce;
      glowAmt = 0.85 * (1 - setp * 0.5);
      screenShake.x = 0;
      screenShake.y = 0;
      flashLayer.style.opacity = 0;

      if (setp > 0.15) {
        adaptText.style.transition = 'none';
        adaptText.style.opacity = Math.min((setp - 0.15) / 0.3, 1);
      }
      glowLayer.style.opacity = 0.45 * (1 - setp);

    } else {
      const cp = (elapsed - TENSION - SNAP - IMPACT - SETTLE) / COOL;
      angle = startAngle + turnAmount;
      glowAmt = 0.42 * (1 - cp);
      screenShake.x = 0;
      screenShake.y = 0;

      if (cp > 0.4) {
        adaptText.style.transition = 'none';
        adaptText.style.opacity = Math.max(0, 1 - (cp - 0.4) / 0.5);
      }
      glowLayer.style.opacity = 0.2 * (1 - cp);
    }

    updateParticles();
    drawWheel(angle, glowAmt);

    if (elapsed < TOTAL) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = startAngle + turnAmount;
      screenShake.x = 0;
      screenShake.y = 0;
      glowLayer.style.opacity = 0;
      flashLayer.style.opacity = 0;
      adaptText.style.opacity = 0;
      drawWheel(currentAngle, 0);
      setTimeout(() => {
        spinning = false;
        promptEl.style.display = 'block';
      }, 400);
    }
  }

  requestAnimationFrame(animate);
}

drawWheel(currentAngle, 0);
document.addEventListener('click', spinOnce);
document.addEventListener('touchstart', (e) => { e.preventDefault(); spinOnce(); }, { passive: false });
</script>
</body>
</html>
